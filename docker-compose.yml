services:
  backend:
    build:
      context: .
      dockerfile: .docker/Dockerfile.dev
    command: npm run start:dev
    restart: on-failure
    mem_limit: 512m
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - ${PORT}:${PORT}
      - 50051:50051
    tty: true
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - PORT=${PORT}
      - GRPC_URL=backend:50051

      - MONGO_URI=mongodb://mongo:27017/${DB_NAME}

      - JWT_ACCESS_TOKEN_SECRET=${JWT_ACCESS_TOKEN_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRES_IN=${JWT_ACCESS_TOKEN_EXPIRES_IN}

      - JWT_REFRESH_TOKEN_SECRET=${JWT_REFRESH_TOKEN_SECRET}
      - JWT_REFRESH_TOKEN_EXPIRES_IN=${JWT_REFRESH_TOKEN_EXPIRES_IN}

      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:${RABBITMQ_PORT}
    networks:
      - personal-network

  mongo:
    image: mongo:7.0
    restart: always
    mem_limit: 256m
    ports:
      - ${MONGO_PORT}:27017
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --port 27017 --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    cap_add:
      - SYS_NICE
    networks:
      - personal-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    mem_limit: 256m
    ports:
      - ${RABBITMQ_PORT}:5672
      - ${RABBITMQ_MANAGEMENT_PORT}:15672
    environment:
      - AMQP_URL=amqp://rabbitmq?connection_attempts=5&retry_delay=5
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_ERLANG_COOKIE=SQOKODSQALRPCLNMEQG
      - RABBITMQ_DEFAULT_VHOST=/
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - personal-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: personal-auth-otelcol
    profiles: ["observability"]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - personal-network

networks:
  personal-network:
    name: personal-network
    driver: bridge
